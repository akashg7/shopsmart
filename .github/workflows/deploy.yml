name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check if EC2 secrets are configured
        id: check_secrets
        run: |
          if [ -z "$EC2_HOST" ]; then
            echo "EC2 secrets not configured, skipping deployment"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}

      - name: Deploy to EC2 via SSH
        if: steps.check_secrets.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # ── Idempotent deployment script ──
            # Safe to run on a fresh EC2 or an already-configured one.

            # 1. Install Node.js if not present
            if ! command -v node &> /dev/null; then
              echo "Installing Node.js 18..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            echo "Node version: $(node -v)"

            # 2. Install PM2 if not present
            if ! command -v pm2 &> /dev/null; then
              echo "Installing PM2..."
              sudo npm install -g pm2
            fi

            # 3. Clone repo if not present, otherwise pull latest
            if [ ! -d "$HOME/shopsmart" ]; then
              echo "Cloning repository for the first time..."
              cd ~
              git clone https://github.com/akashg7/shopsmart.git
            fi
            cd ~/shopsmart
            echo "Pulling latest changes..."
            git pull origin main

            # 4. Install dependencies
            echo "Installing server dependencies..."
            cd server && npm install

            echo "Installing client dependencies..."
            cd ../client && npm install && npm run build

            # 5. Restart server with PM2
            echo "Restarting server with PM2..."
            cd ../server
            pm2 describe shopsmart-backend > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              pm2 restart shopsmart-backend
            else
              pm2 start src/index.js --name shopsmart-backend
            fi

            echo "Deployment complete!"

